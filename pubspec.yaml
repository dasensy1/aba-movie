name: movie_tracker
description: Movie Tracker App - локальное приложение для отслеживания фильмов (без API).
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI пакеты
  google_fonts: ^6.1.0
  convex_bottom_bar: ^3.2.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_staggered_grid_view: ^0.7.0
  flutter_rating_bar: ^4.0.1
  intl: ^0.19.0

  # State Management
  provider: ^6.1.1

  # Локальное хранилище
  shared_preferences: ^2.2.2
  sqflite: ^2.3.2
  path: ^1.9.0

  # Утилиты
  fluttertoast: ^8.2.4

  # Иконки
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
